# =============================================================================
# Hosting Panel — Platform Helm Chart Default Values
# =============================================================================

# -- Global settings
global:
  # -- Platform hostname (FQDN for the panel UI and services)
  hostname: "panel.example.com"
  # -- Number of cluster nodes: 1 (single-node) or 3 (HA)
  nodeCount: 1
  # -- Default storage class for static PVCs (mariadb, postfix, clamav, etc.)
  storageClass: "local-path"
  # -- User volume mode: "pvc" (default, uses storageClass) or "hostpath" (direct hostPath mounts)
  userVolumeMode: "hostpath"
  # -- PHP image prefix (default: php, use GHCR mirror for air-gapped)
  phpImagePrefix: "ghcr.io/lmadarassy/kubecp/mirror/php"
  # -- Storage class for databases (needs fsync — not suitable for FUSE-based storage)
  # -- Platform namespace for core components
  namespace: "hosting-system"
  # -- Network mode: "single-ip" (hostNetwork + NodePort) or "multi-ip" (MetalLB LoadBalancer)
  # single-ip: All services share the node IP, Contour/Envoy uses hostNetwork on ports 80/443
  # multi-ip: Each service type gets a dedicated LoadBalancer IP via MetalLB allow-shared-ip
  networkMode: "single-ip"
  # -- LoadBalancer IP for multi-ip mode (MetalLB assigns this IP to all hosting services)
  loadBalancerIP: ""

# =============================================================================
# Panel Core — Go backend + Angular frontend
# =============================================================================
panel:
  image:
    repository: hosting-panel/panel-core
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  ui:
    image:
      repository: hosting-panel/panel-ui
      tag: "0.1.0"
      pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  service:
    type: ClusterIP
    port: 8080
  # -- Keycloak OIDC settings for the panel
  oidc:
    issuerUrl: ""  # auto-derived from keycloak config if empty
    clientId: "panel-ui"
    realm: "hosting"
  # -- Prometheus metrics
  metrics:
    enabled: true
    port: 9090
  # -- Keycloak admin credentials for user management
  keycloakAdmin:
    enabled: false
    password: ""

# =============================================================================
# Hosting Operator
# =============================================================================
operator:
  image:
    repository: hosting-panel/hosting-operator
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# =============================================================================
# PowerDNS — Authoritative DNS Server
# =============================================================================
powerdns:
  enabled: true
  image:
    repository: ghcr.io/lmadarassy/kubecp/mirror/pdns-auth
    tag: "4.8"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  storage:
    size: "5Gi"
  # -- PowerDNS REST API
  api:
    enabled: true
    port: 8081
    key: "test-pdns-api-key"
  # -- Database credentials (gmysql backend)
  db:
    password: ""
  # -- DNS service ports
  service:
    dnsPort: 53
    apiPort: 8081
    type: LoadBalancer
  # -- Backend: sqlite or gmysql (galera)
  backend: "gmysql"

# =============================================================================
# SFTP Pod
# =============================================================================
sftp:
  enabled: true
  image:
    repository: hosting-panel-sftp
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  service:
    type: LoadBalancer
    port: 22

# =============================================================================
# Mail System — Postfix (SMTP) + Dovecot (IMAP/POP3)
# =============================================================================
mail:
  # Keycloak OIDC client for Dovecot checkpassword auth
  keycloak:
    clientSecret: ""
  smtp:
    enabled: true
    image:
      repository: ghcr.io/lmadarassy/kubecp/mirror/postfix
      tag: "latest"
      pullPolicy: IfNotPresent
    replicas: 1
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
    service:
      type: LoadBalancer
      port: 25
      submissionPort: 587
  imap:
    enabled: true
    image:
      repository: ghcr.io/lmadarassy/kubecp/mirror/dovecot
      tag: "2.3"
      pullPolicy: IfNotPresent
    replicas: 1
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
    service:
      type: LoadBalancer
      imapPort: 143
      imapsPort: 993
      pop3Port: 110
      pop3sPort: 995
  storage:
    size: "20Gi"

# =============================================================================
# Roundcube Webmail
# =============================================================================
roundcube:
  enabled: true
  image:
    repository: ghcr.io/lmadarassy/kubecp/mirror/roundcube
    tag: "1.6.9"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

# =============================================================================
# Rspamd — Spam filtering with milter interface for Postfix
# =============================================================================
rspamd:
  enabled: true
  image:
    repository: ghcr.io/lmadarassy/kubecp/mirror/rspamd
    tag: "latest"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  service:
    # Milter port for Postfix integration
    milterPort: 11332
    # Web UI / API port
    webPort: 11334

# =============================================================================
# ClamAV — Antivirus scanning for email
# =============================================================================
clamav:
  enabled: true
  image:
    repository: ghcr.io/lmadarassy/kubecp/mirror/clamav
    tag: "1.4"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: "200m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  service:
    port: 3310
  storage:
    # ClamAV virus definition database storage
    size: "2Gi"

# =============================================================================
# Backup CronJob
# =============================================================================
backup:
  enabled: true
  image:
    repository: hosting-panel/backup-job
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  # -- Default schedule (daily at 2:00 AM)
  schedule: "0 2 * * *"
  # -- Default retention (number of backups to keep)
  retentionCount: 7
  # -- Storage destination: s3, sftp, or local
  destination: "local"
  storage:
    size: "50Gi"
  # -- S3 settings (when destination=s3)
  s3:
    endpoint: ""
    bucket: ""
    accessKey: ""
    secretKey: ""
  # -- SFTP settings (when destination=sftp)
  sftpRemote:
    host: ""
    port: 22
    username: ""
    keySecret: ""
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# =============================================================================
# cert-manager — ClusterIssuer settings
# =============================================================================
certManager:
  enabled: true
  installCRDs: true
  clusterIssuers:
    # -- Admin email for ACME registration
    email: "admin@example.com"
    staging:
      enabled: true
      server: "https://acme-staging-v02.api.letsencrypt.org/directory"
    production:
      enabled: true
      server: "https://acme-v02.api.letsencrypt.org/directory"

# =============================================================================
# MetalLB — L2 Load Balancer for bare metal
# =============================================================================
metallb:
  enabled: true
  # -- IP address pool for LoadBalancer services
  ipAddressPool:
    name: "hosting-pool"
    # -- IP range to allocate (adjust to your network)
    addresses:
      - "192.168.1.240-192.168.1.250"
  l2Advertisement:
    name: "hosting-l2advert"

# =============================================================================
# Contour — Envoy-based Ingress Controller
# =============================================================================
contour:
  enabled: true
  envoy:
    service:
      # In single-ip mode: Envoy uses hostNetwork (ports 80/443 directly on node)
      # In multi-ip mode: Envoy uses LoadBalancer with MetalLB shared IP
      type: LoadBalancer
    # hostNetwork is enabled in single-ip mode via Helm override in install script
    hostNetwork: false
  # Contour config for single-ip mode (set via install script):
  # contour.envoy.hostNetwork=true, contour.envoy.service.type=ClusterIP

# =============================================================================
# Keycloak — Identity Provider
# =============================================================================
keycloak:
  enabled: true
  auth:
    adminUser: "admin"
    adminPassword: ""  # generated by install script if empty
  # -- Resource limits (reduced for single-node)
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  # -- Probe tuning for slow Java startup on low-memory nodes
  livenessProbe:
    initialDelaySeconds: 300
    periodSeconds: 10
    failureThreshold: 10
  readinessProbe:
    initialDelaySeconds: 120
    periodSeconds: 10
  # -- Extra Java opts for reduced memory
  extraEnvVars:
    - name: JAVA_OPTS_APPEND
      value: "-XX:MaxRAMPercentage=65 -XX:MetaspaceSize=96m -XX:MaxMetaspaceSize=160m"
  # -- Hosting realm configuration
  realm:
    name: "hosting"
    roles:
      - "admin"
      - "user"
    oidcClient:
      clientId: "panel-ui"
      redirectUris:
        - "https://panel.example.com/*"
      webOrigins:
        - "https://panel.example.com"
    ldapFederation:
      enabled: false
  postgresql:
    enabled: true
    auth:
      postgresPassword: ""
      database: keycloak
      username: keycloak
      password: ""
    primary:
      persistence:
        enabled: true
        storageClass: ""
        size: "1Gi"
  externalDatabase:
    host: ""
    port: 5432
    database: "keycloak"
    user: "keycloak"
    password: ""
  persistence:
    enabled: true
    storageClass: ""
    size: "5Gi"

# =============================================================================
# MariaDB Galera Cluster
# =============================================================================
mariadbGalera:
  enabled: true
  # -- Root password (set via install script)
  rootUser:
    password: ""
  # -- Galera replication settings
  galera:
    mariabackup:
      password: ""
  # -- Replica count: auto-set based on global.nodeCount
  # 3-node cluster → 3 replicas, 1-node → 1 replica
  replicaCount: 1
  persistence:
    enabled: true
    storageClass: "local-path"
    size: "10Gi"
  # -- Database initialization
  db:
    name: "hosting"
    user: "hosting"
    password: ""

# =============================================================================
# Longhorn — Distributed Block Storage
# =============================================================================
longhorn:
  enabled: true
  defaultSettings:
    # -- Default replica count: auto-set based on global.nodeCount
    # 3-node → 3 replicas, 1-node → 1 replica
    defaultReplicaCount: 3
    # -- Guaranteed engine manager CPU
    guaranteedEngineManagerCPU: 12
    # -- Guaranteed replica manager CPU
    guaranteedReplicaManagerCPU: 12

# =============================================================================
# phpMyAdmin
# =============================================================================
phpmyadmin:
  enabled: true
  db:
    host: "mariadb-galera.hosting-system.svc.cluster.local"
    port: 3306

# =============================================================================
# Monitoring — Prometheus + Grafana (kube-prometheus-stack)
# =============================================================================
monitoring:
  enabled: true
  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
      serviceMonitorSelectorNilUsesHelmValues: false
  grafana:
    enabled: true
    adminPassword: ""  # set via install script
    persistence:
      enabled: true
      storageClassName: local-path
      size: 5Gi
    sidecar:
      dashboards:
        enabled: true
        searchNamespace: ALL
  # Disable components not needed on k3s single-node
  kubeEtcd:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeProxy:
    enabled: false
