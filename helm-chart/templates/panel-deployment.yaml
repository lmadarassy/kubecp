apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hosting-panel.fullname" . }}-panel
  namespace: {{ include "hosting-panel.namespace" . }}
  labels:
    {{- include "hosting-panel.panelLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.panel.replicas }}
  selector:
    matchLabels:
      {{- include "hosting-panel.panelSelectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        {{- include "hosting-panel.panelSelectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "hosting-panel.fullname" . }}-panel
      imagePullSecrets:
        - name: dockerhub-creds
      containers:
        # Panel Core backend (Go)
        - name: panel-core
          image: "{{ .Values.panel.image.repository }}:{{ .Values.panel.image.tag }}"
          imagePullPolicy: {{ .Values.panel.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            {{- if .Values.panel.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.panel.metrics.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: USER_VOLUME_MODE
              value: {{ .Values.global.userVolumeMode | quote }}
            - name: BACKUP_IMAGE
              value: "{{ .Values.backup.image.repository }}:{{ .Values.backup.image.tag }}"
            - name: PANEL_HOSTNAME
              value: {{ .Values.global.hostname | quote }}
            - name: KEYCLOAK_URL
              value: {{ include "hosting-panel.keycloakUrl" . | quote }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.panel.oidc.realm | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.panel.oidc.clientId | quote }}
            - name: GALERA_HOST
              value: {{ include "hosting-panel.galeraHost" . | quote }}
            - name: GALERA_PORT
              value: "3306"
            - name: GALERA_USER
              value: {{ .Values.mariadbGalera.db.user | quote }}
            - name: GALERA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hosting-panel.fullname" . }}-db-credentials
                  key: password
            - name: POWERDNS_API_URL
              value: {{ include "hosting-panel.powerdnsApiUrl" . | quote }}
            - name: POWERDNS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hosting-panel.fullname" . }}-powerdns-api
                  key: api-key
            - name: BUILD_VERSION
              value: {{ .Values.panel.image.tag | quote }}
            {{- if .Values.panel.keycloakAdmin.enabled }}
            - name: KEYCLOAK_ADMIN_URL
              value: {{ printf "%s/admin/realms/%s" (include "hosting-panel.keycloakUrl" .) .Values.panel.oidc.realm | quote }}
            - name: KEYCLOAK_ISSUER_URL
              value: {{ printf "%s/realms/%s" (include "hosting-panel.keycloakUrl" .) .Values.panel.oidc.realm | quote }}
            - name: KEYCLOAK_ADMIN_USERNAME
              value: {{ .Values.panel.keycloakAdmin.user | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hosting-panel.fullname" . }}-keycloak-admin
                  key: password
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.panel.resources | nindent 12 }}
        # Panel UI frontend (nginx serving Angular SPA)
        - name: panel-ui
          image: "{{ .Values.panel.ui.image.repository }}:{{ .Values.panel.ui.image.tag }}"
          imagePullPolicy: {{ .Values.panel.ui.image.pullPolicy }}
          env:
            - name: OIDC_ISSUER
              {{- $scheme := ternary "https" "http" .Values.certManager.enabled }}
              {{- $kcHost := .Values.panel.oidc.keycloakHost | default .Values.global.hostname }}
              value: "{{ $scheme }}://{{ $kcHost }}/realms/{{ .Values.panel.oidc.realm }}"
          ports:
            - name: ui
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
