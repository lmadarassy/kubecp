{{- if .Values.mail.smtp.enabled }}
# =============================================================================
# Postfix SMTP — Deployment with LDAP auth against Keycloak
# Config is generated by configmaps/postfix-config.yaml
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hosting-panel.fullname" . }}-mail-smtp
  namespace: {{ include "hosting-panel.namespace" . }}
  labels:
    {{- include "hosting-panel.labels" . | nindent 4 }}
    app.kubernetes.io/name: mail-smtp
    app.kubernetes.io/component: mail
spec:
  replicas: {{ .Values.mail.smtp.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: mail-smtp
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mail-smtp
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include "hosting-panel.fullname" . }}-postfix-config
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      initContainers:
        - name: copy-postfix-config
          image: "{{ .Values.mail.smtp.image.repository }}:{{ .Values.mail.smtp.image.tag }}"
          imagePullPolicy: {{ .Values.mail.smtp.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              cp /config-ro/main.cf /etc/postfix/main.cf
              cp /config-ro/master.cf /etc/postfix/master.cf
              chmod 644 /etc/postfix/main.cf /etc/postfix/master.cf
              # Initialize empty hash maps for virtual mailbox (operator populates these)
              touch /etc/postfix/virtual_domains /etc/postfix/virtual_mailbox /etc/postfix/virtual_alias
              postmap /etc/postfix/virtual_domains
              postmap /etc/postfix/virtual_mailbox
              postmap /etc/postfix/virtual_alias
          volumeMounts:
            - name: postfix-config-ro
              mountPath: /config-ro
              readOnly: true
            - name: postfix-config
              mountPath: /etc/postfix
      containers:
        - name: postfix
          image: "{{ .Values.mail.smtp.image.repository }}:{{ .Values.mail.smtp.image.tag }}"
          imagePullPolicy: {{ .Values.mail.smtp.image.pullPolicy }}
          ports:
            - name: smtp
              containerPort: 25
              protocol: TCP
            - name: submission
              containerPort: 587
              protocol: TCP
          env:
            - name: HOSTNAME
              value: "mail.{{ .Values.global.hostname }}"
            - name: RELAYHOST
              value: ""
            - name: ALLOWED_SENDER_DOMAINS
              value: {{ .Values.global.hostname | quote }}
            {{- if .Values.keycloak.realm.ldapFederation.enabled }}
            - name: LDAP_SERVER
              value: {{ .Values.keycloak.realm.ldapFederation.connectionUrl | quote }}
            - name: LDAP_BIND_DN
              value: {{ .Values.keycloak.realm.ldapFederation.bindDn | quote }}
            - name: LDAP_BIND_PASSWORD
              value: {{ .Values.keycloak.realm.ldapFederation.bindCredential | quote }}
            - name: LDAP_BASE_DN
              value: {{ .Values.keycloak.realm.ldapFederation.usersDn | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.mail.smtp.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: smtp
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: smtp
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: mail-data
              mountPath: /var/mail/vhosts
            - name: postfix-spool
              mountPath: /var/spool/postfix
            - name: postfix-config
              mountPath: /etc/postfix
      volumes:
        - name: mail-data
          persistentVolumeClaim:
            claimName: {{ include "hosting-panel.fullname" . }}-mail-data
        - name: postfix-spool
          emptyDir: {}
        - name: postfix-config
          emptyDir: {}
        - name: postfix-config-ro
          configMap:
            name: {{ include "hosting-panel.fullname" . }}-postfix-config
            defaultMode: 0644
---
# =============================================================================
# Postfix SMTP — Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hosting-panel.fullname" . }}-mail-smtp
  namespace: {{ include "hosting-panel.namespace" . }}
  labels:
    {{- include "hosting-panel.labels" . | nindent 4 }}
    app.kubernetes.io/name: mail-smtp
spec:
  type: ClusterIP
  ports:
    - name: smtp
      port: {{ .Values.mail.smtp.service.port }}
      targetPort: smtp
      protocol: TCP
    - name: submission
      port: {{ .Values.mail.smtp.service.submissionPort }}
      targetPort: submission
      protocol: TCP
  selector:
    app.kubernetes.io/name: mail-smtp
    app.kubernetes.io/instance: {{ .Release.Name }}
---
# =============================================================================
# Mail Data — Shared PVC for email storage (Longhorn RWX)
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "hosting-panel.fullname" . }}-mail-data
  namespace: {{ include "hosting-panel.namespace" . }}
  labels:
    {{- include "hosting-panel.labels" . | nindent 4 }}
    app.kubernetes.io/name: mail-data
spec:
  accessModes:
    {{- if le (int .Values.global.nodeCount) 1 }}
    - ReadWriteOnce
    {{- else }}
    - ReadWriteMany
    {{- end }}
  storageClassName: {{ .Values.global.storageClass }}
  resources:
    requests:
      storage: {{ .Values.mail.storage.size }}
{{- end }}
