{{- if .Values.roundcube.enabled }}
# =============================================================================
# Roundcube — Configuration ConfigMap (Helm template → ConfigMap)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hosting-panel.fullname" . }}-roundcube-config
  namespace: {{ include "hosting-panel.namespace" . }}
  labels:
    {{- include "hosting-panel.labels" . | nindent 4 }}
    app.kubernetes.io/name: roundcube
    app.kubernetes.io/component: webmail
data:
  config.inc.php: |
    <?php
    // Roundcube configuration — generated by Helm template
    $config = [];

    // IMAP server
    $config['imap_host'] = '{{ include "hosting-panel.fullname" . }}-mail-imap:{{ .Values.mail.imap.service.imapPort }}';
    $config['imap_auth_type'] = 'LOGIN';

    // SMTP server
    $config['smtp_host'] = '{{ include "hosting-panel.fullname" . }}-mail-smtp:{{ .Values.mail.smtp.service.submissionPort }}';
    $config['smtp_auth_type'] = 'LOGIN';
    $config['smtp_user'] = '%u';
    $config['smtp_pass'] = '%p';

    // Database
    $config['db_dsnw'] = 'mysql://roundcube:roundcube@{{ include "hosting-panel.galeraHost" . }}/roundcube';

    // General settings
    $config['product_name'] = 'Hosting Panel Webmail';
    $config['des_key'] = '{{ randAlphaNum 24 }}';
    $config['plugins'] = ['archive', 'zipdownload', 'managesieve'];
    $config['language'] = 'en_US';
    $config['skin'] = 'elastic';
    $config['upload_max_filesize'] = '25M';
    $config['draft_autosave'] = 60;
{{- end }}
