{{- if .Values.mail.imap.enabled }}
# Dovecot checkpassword script — authenticates against Keycloak ROPC
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hosting-panel.fullname" . }}-dovecot-checkpassword
  namespace: {{ include "hosting-panel.namespace" . }}
  labels:
    {{- include "hosting-panel.labels" . | nindent 4 }}
    app.kubernetes.io/name: mail-imap
data:
  kc-checkpassword: |
    #!/bin/sh
    # DJB checkpassword protocol for Dovecot → Keycloak ROPC authentication.
    # Also handles userdb-only lookups (LMTP/doveadm) where no password is provided.

    # Read from fd 3 and convert null bytes to newlines
    INPUT=$(head -c 4096 <&3 | tr '\0' '\n')
    USER=$(echo "$INPUT" | sed -n '1p')
    PASS=$(echo "$INPUT" | sed -n '2p')

    if [ -z "$USER" ]; then
      exit 1
    fi

    # Extract local part and domain
    DOMAIN=$(echo "$USER" | sed 's/.*@//')
    LOCAL=$(echo "$USER" | sed 's/@.*//')

    # Set userdb environment (needed for both passdb and userdb lookups)
    export USER
    export HOME="/var/mail/vhosts/${DOMAIN}/${LOCAL}"
    export userdb_uid=5000
    export userdb_gid=5000
    export userdb_mail="maildir:/var/mail/vhosts/${DOMAIN}/${LOCAL}/Maildir"

    # If no password provided, this is a userdb-only lookup (LMTP/doveadm)
    # Return success with userdb info (AUTHORIZED=2 signals userdb-only response)
    if [ -z "$PASS" ]; then
      export AUTHORIZED=2
      exec "$@"
    fi

    # Password provided — authenticate against Keycloak
    CURL="/opt/curl-libs/curl"
    [ -x "$CURL" ] || CURL="curl"
    export LD_LIBRARY_PATH="/opt/curl-libs:${LD_LIBRARY_PATH}"

    HTTP_CODE=$($CURL -sf -o /dev/null -w '%{http_code}' \
      -X POST "${KC_TOKEN_URL}" \
      -H "Content-Type: application/x-www-form-urlencoded" \
      --data-urlencode "grant_type=password" \
      --data-urlencode "client_id=${KC_CLIENT_ID}" \
      --data-urlencode "client_secret=${KC_CLIENT_SECRET}" \
      --data-urlencode "username=${USER}" \
      --data-urlencode "password=${PASS}" \
      --max-time 5 2>/dev/null)

    if [ "$HTTP_CODE" = "200" ]; then
      exec "$@"
    fi

    [ "$HTTP_CODE" = "000" ] && exit 111
    exit 1
{{- end }}
