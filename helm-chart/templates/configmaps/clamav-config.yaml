{{- if .Values.clamav.enabled }}
# =============================================================================
# ClamAV — Configuration ConfigMap (Helm template → ConfigMap)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hosting-panel.fullname" . }}-clamav-config
  namespace: {{ include "hosting-panel.namespace" . }}
  labels:
    {{- include "hosting-panel.labels" . | nindent 4 }}
    app.kubernetes.io/name: clamav
    app.kubernetes.io/component: mail
data:
  clamd.conf: |
    # ClamAV daemon configuration — generated by Helm
    TCPSocket {{ .Values.clamav.service.port }}
    TCPAddr 0.0.0.0
    MaxThreads 4
    MaxConnectionQueueLength 30
    LogSyslog no
    LogVerbose no
    LogClean no
    LogTime yes
    DatabaseDirectory /var/lib/clamav
    TemporaryDirectory /tmp
    MaxScanSize 100M
    MaxFileSize 25M
    MaxRecursion 16
    MaxFiles 10000
    StreamMaxLength 25M
    Foreground yes

  freshclam.conf: |
    # FreshClam — virus definition updater configuration
    DatabaseDirectory /var/lib/clamav
    DatabaseMirror database.clamav.net
    UpdateLogFile /dev/stdout
    LogVerbose no
    LogSyslog no
    LogTime yes
    Checks 4
    Foreground yes
{{- end }}
