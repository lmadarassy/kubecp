# =============================================================================
# PHP Default Config Profile — ConfigMap (Helm template → ConfigMap)
# Applied to websites that don't specify a custom PHP_Config_Profile
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hosting-panel.fullname" . }}-php-default-profile
  namespace: {{ include "hosting-panel.namespace" . }}
  labels:
    {{- include "hosting-panel.labels" . | nindent 4 }}
    app.kubernetes.io/name: php-config
    app.kubernetes.io/component: website
    hosting.panel/php-profile: "default"
data:
  php-overrides.ini: |
    ; PHP Default Config Profile — generated by Helm template
    ; These values can be overridden per-website via PHP_Config_Profile

    ; Resource limits
    memory_limit = 256M
    max_execution_time = 30
    max_input_time = 60
    max_input_vars = 1000
    post_max_size = 64M
    upload_max_filesize = 64M
    max_file_uploads = 20

    ; Error handling
    display_errors = Off
    display_startup_errors = Off
    log_errors = On
    error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

    ; Session
    session.gc_maxlifetime = 1440
    session.cookie_httponly = 1
    session.cookie_secure = 1
    session.use_strict_mode = 1

    ; OPcache
    opcache.enable = 1
    opcache.memory_consumption = 128
    opcache.interned_strings_buffer = 8
    opcache.max_accelerated_files = 10000
    opcache.revalidate_freq = 2
    opcache.validate_timestamps = 1

    ; Security
    expose_php = Off
    allow_url_fopen = On
    allow_url_include = Off

    ; Timezone (overridden by platform timezone setting)
    date.timezone = UTC
