# Database credentials for Panel Core and Operator
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hosting-panel.fullname" . }}-db-credentials
  namespace: {{ include "hosting-panel.namespace" . }}
  labels:
    {{- include "hosting-panel.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ default (randAlphaNum 16) .Values.mariadbGalera.db.password | quote }}
  root-password: {{ default (randAlphaNum 16) .Values.mariadbGalera.rootUser.password | quote }}
{{- if and .Values.backup.enabled (eq .Values.backup.destination "s3") }}
---
# S3 backup credentials
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hosting-panel.fullname" . }}-backup-s3
  namespace: {{ include "hosting-panel.namespace" . }}
  labels:
    {{- include "hosting-panel.labels" . | nindent 4 }}
type: Opaque
stringData:
  access-key: {{ .Values.backup.s3.accessKey | quote }}
  secret-key: {{ .Values.backup.s3.secretKey | quote }}
{{- end }}
{{- if .Values.panel.keycloakAdmin.enabled }}
---
# Keycloak admin credentials for user management API
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hosting-panel.fullname" . }}-keycloak-admin
  namespace: {{ include "hosting-panel.namespace" . }}
  labels:
    {{- include "hosting-panel.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.panel.keycloakAdmin.password | quote }}
{{- end }}
{{- if .Values.sftp.enabled }}
---
# SFTP Keycloak client secret for ROPC authentication
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hosting-panel.fullname" . }}-sftp-client
  namespace: {{ include "hosting-panel.namespace" . }}
  labels:
    {{- include "hosting-panel.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret: {{ default (randAlphaNum 32) .Values.sftp.keycloakClientSecret | quote }}
{{- end }}
