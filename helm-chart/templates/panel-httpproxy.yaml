apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: {{ include "hosting-panel.fullname" . }}-panel
  namespace: {{ include "hosting-panel.namespace" . }}
  labels:
    {{- include "hosting-panel.panelLabels" . | nindent 4 }}
spec:
  virtualhost:
    fqdn: {{ .Values.global.hostname }}
    {{- if .Values.certManager.enabled }}
    tls:
      secretName: {{ include "hosting-panel.fullname" . }}-panel-tls
    {{- end }}
  routes:
    # Keycloak auth endpoints — reverse proxied through panel hostname
    - conditions:
        - prefix: /realms
      services:
        - name: {{ .Release.Name }}-keycloak
          port: 80
      timeoutPolicy:
        response: 120s
    - conditions:
        - prefix: /resources
      services:
        - name: {{ .Release.Name }}-keycloak
          port: 80
    - conditions:
        - prefix: /js
      services:
        - name: {{ .Release.Name }}-keycloak
          port: 80
    # API routes → panel-core backend
    - conditions:
        - prefix: /api
      services:
        - name: {{ include "hosting-panel.fullname" . }}-panel
          port: {{ .Values.panel.service.port }}
    # Metrics endpoint
    - conditions:
        - prefix: /metrics
      services:
        - name: {{ include "hosting-panel.fullname" . }}-panel
          port: {{ .Values.panel.service.port }}
    # All other routes → panel-ui (Angular SPA)
    - conditions:
        - prefix: /
      services:
        - name: {{ include "hosting-panel.fullname" . }}-panel
          port: 80
