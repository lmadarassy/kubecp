{{- if .Values.powerdns.enabled }}
# =============================================================================
# PowerDNS — StatefulSet
# Config is generated by configmaps/powerdns-config.yaml
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "hosting-panel.fullname" . }}-powerdns
  namespace: {{ include "hosting-panel.namespace" . }}
  labels:
    {{- include "hosting-panel.labels" . | nindent 4 }}
    app.kubernetes.io/name: powerdns
    app.kubernetes.io/component: dns
spec:
  serviceName: {{ include "hosting-panel.fullname" . }}-powerdns
  replicas: {{ .Values.powerdns.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: powerdns
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: powerdns
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      initContainers:
        {{- if eq .Values.powerdns.backend "gsqlite3" }}
        - name: init-sqlite
          image: "{{ .Values.powerdns.image.repository }}:{{ .Values.powerdns.image.tag }}"
          imagePullPolicy: {{ .Values.powerdns.image.pullPolicy }}
          securityContext:
            runAsUser: 0
          command: ["sh", "-c"]
          args:
            - |
              if [ ! -f /data/pdns.sqlite3 ]; then
                sqlite3 /data/pdns.sqlite3 < /usr/local/share/doc/pdns/schema.sqlite3.sql
              fi
              chown -R pdns:pdns /data
          volumeMounts:
            - name: powerdns-data
              mountPath: /data
        {{- end }}
      containers:
        - name: powerdns
          image: "{{ .Values.powerdns.image.repository }}:{{ .Values.powerdns.image.tag }}"
          imagePullPolicy: {{ .Values.powerdns.image.pullPolicy }}
          command: ["/usr/local/sbin/pdns_server"]
          args: ["--config-dir=/etc/powerdns", "--guardian=no", "--daemon=no"]
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: api
              containerPort: {{ .Values.powerdns.api.port }}
              protocol: TCP
          {{- if eq .Values.powerdns.backend "gmysql" }}
          env:
            - name: PDNS_GMYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hosting-panel.fullname" . }}-powerdns-db
                  key: password
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/v1/servers/localhost
              port: api
              httpHeaders:
                - name: X-API-Key
                  value: {{ .Values.powerdns.api.key | quote }}
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: dns-tcp
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.powerdns.resources | nindent 12 }}
          volumeMounts:
            - name: powerdns-data
              mountPath: /data
            - name: powerdns-config
              mountPath: /etc/powerdns/pdns.conf
              subPath: pdns.conf
              readOnly: true
      volumes:
        - name: powerdns-config
          configMap:
            name: {{ include "hosting-panel.fullname" . }}-powerdns-config
  volumeClaimTemplates:
    - metadata:
        name: powerdns-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.global.storageClass }}
        resources:
          requests:
            storage: {{ .Values.powerdns.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hosting-panel.fullname" . }}-powerdns
  namespace: {{ include "hosting-panel.namespace" . }}
  labels:
    {{- include "hosting-panel.labels" . | nindent 4 }}
    app.kubernetes.io/name: powerdns
spec:
  type: ClusterIP
  ports:
    - name: dns-tcp
      port: {{ .Values.powerdns.service.dnsPort }}
      targetPort: dns-tcp
      protocol: TCP
    - name: dns-udp
      port: {{ .Values.powerdns.service.dnsPort }}
      targetPort: dns-udp
      protocol: UDP
    - name: api
      port: {{ .Values.powerdns.service.apiPort }}
      targetPort: api
      protocol: TCP
  selector:
    app.kubernetes.io/name: powerdns
    app.kubernetes.io/instance: {{ .Release.Name }}
---
# PowerDNS API key secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hosting-panel.fullname" . }}-powerdns-api
  namespace: {{ include "hosting-panel.namespace" . }}
  labels:
    {{- include "hosting-panel.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ .Values.powerdns.api.key | quote }}
{{- if eq .Values.powerdns.backend "gmysql" }}
---
# PowerDNS DB credentials secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hosting-panel.fullname" . }}-powerdns-db
  namespace: {{ include "hosting-panel.namespace" . }}
  labels:
    {{- include "hosting-panel.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ default (randAlphaNum 16) .Values.mariadbGalera.db.password | quote }}
{{- end }}
{{- end }}
