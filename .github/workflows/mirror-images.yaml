name: Mirror Third-Party Images

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am

env:
  REGISTRY: ghcr.io
  PREFIX: ghcr.io/${{ github.repository_owner }}/kubecp/mirror

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          - src: docker.io/bitnami/mariadb-galera:12.0.2-debian-12-r0
            dst: mariadb-galera:12.0.2
          - src: docker.io/bitnami/postgresql:17.6.0-debian-12-r0
            dst: postgresql:17.6.0
          - src: docker.io/bitnami/keycloak:26.3.3-debian-12-r0
            dst: keycloak:26.3.3
          - src: docker.io/powerdns/pdns-auth-48:latest
            dst: pdns-auth:4.8
          - src: docker.io/dovecot/dovecot:2.3
            dst: dovecot:2.3
          - src: docker.io/roundcube/roundcubemail:1.6.9-apache
            dst: roundcube:1.6.9
          - src: docker.io/rspamd/rspamd:latest
            dst: rspamd:latest
          - src: docker.io/boky/postfix:latest
            dst: postfix:latest
          - src: docker.io/clamav/clamav:1.4
            dst: clamav:1.4
          - src: docker.io/library/php:8.2-apache
            dst: php:8.2-apache
          - src: docker.io/library/php:8.5-apache
            dst: php:8.5-apache
          - src: docker.io/phpmyadmin/phpmyadmin:latest
            dst: phpmyadmin:latest
          - src: docker.io/library/busybox:1.36
            dst: busybox:1.36
          - src: docker.io/curlimages/curl:8.5.0
            dst: curl:8.5.0
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, retag, push
        run: |
          docker pull ${{ matrix.src }}
          docker tag ${{ matrix.src }} ${{ env.PREFIX }}/${{ matrix.dst }}
          docker push ${{ env.PREFIX }}/${{ matrix.dst }}
